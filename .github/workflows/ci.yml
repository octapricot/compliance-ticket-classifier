name: CI/CD Pipeline

# ---------------------------------------------------------------
# TRIGGERS
#   push to main        - continuous integration on every merge
#   pull_request        - validate before merging
#   workflow_dispatch   - manual run from the Actions tab (on demand)
#   schedule            - weekly retrain, Mondays 06:00 UTC
# ---------------------------------------------------------------
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ============ 1. LINT ============
  lint:
    name: Lint code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ || true   # report, don't block on style

  # ============ 2. TRAIN ============
  # Pulls the versioned dataset from S3 (DVC), retrains the baseline,
  # logs metrics to W&B and uploads the model as a versioned artifact.
  train:
    name: Train model
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install dvc[s3] pandas scikit-learn wandb python-dotenv joblib pyarrow

      # DVC needs S3 credentials to fetch the dataset.
      - name: Pull dataset from S3 (DVC)
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          dvc pull data/labeled/train.parquet data/labeled/test.parquet -v
          ls -la data/labeled/

      - name: Train baseline + log to W&B
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
        run: python src/train/train_baseline.py

  # ============ 3. DEPLOY ============
  # Builds the inference image, smoke-tests it, and publishes it to
  # GitHub Container Registry (GHCR) tagged with the commit SHA + latest.
  deploy:
    name: Build, test and publish image
    runs-on: ubuntu-latest
    needs: train           # only deploy if training succeeded
    permissions:
      contents: read
      packages: write      # required to push to GHCR
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # provided automatically

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image (load locally for smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: compliance-classifier:test

      - name: Smoke test the service
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
        run: |
          docker run -d --name classifier -p 8000:8000 \
            -e WANDB_API_KEY="$WANDB_API_KEY" compliance-classifier:test
          echo "Waiting for the service (it pulls the model from W&B)..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "Service is up."
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Service did not become healthy."
              docker logs classifier
              exit 1
            fi
            sleep 10
          done
          echo "--- /predict ---"
          curl -sf -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"text": "Add user data deletion endpoint for GDPR"}' | tee /tmp/pred.json
          grep -q "label" /tmp/pred.json

      - name: Publish image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Clean up
        if: always()
        run: docker rm -f classifier || true