name: CI/CD Pipeline

# Run on every push to main, and on pull requests targeting main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff (lint check)
        run: ruff check src/ || true   # report issues but don't fail the build on style

  build-and-smoke-test:
    name: Build image and smoke-test the service
    runs-on: ubuntu-latest
    needs: lint          # only runs if lint job completes
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t compliance-classifier .

      - name: Run container
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
        run: |
          docker run -d --name classifier \
            -p 8000:8000 \
            -e WANDB_API_KEY="$WANDB_API_KEY" \
            compliance-classifier

      - name: Wait for the service to be ready
        run: |
          echo "Waiting for service to start (it pulls the model from W&B)..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "Service is up!"
              exit 0
            fi
            echo "  attempt $i/30 - not ready yet, waiting 10s..."
            sleep 10
          done
          echo "Service did not become healthy in time."
          docker logs classifier
          exit 1

      - name: Smoke test /health
        run: |
          response=$(curl -s http://localhost:8000/health)
          echo "Health response: $response"
          echo "$response" | grep -q "ok" && echo "PASS" || (echo "FAIL" && exit 1)

      - name: Smoke test /predict
        run: |
          curl -s -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"text": "Add user data deletion endpoint for GDPR"}'

      - name: Clean up
        if: always()
        run: docker rm -f classifier || true
